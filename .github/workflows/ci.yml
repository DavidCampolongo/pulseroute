name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate repository
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://pulseroute:pulseroute_ci_password@localhost:5432/pulseroute_ci

    services:
      postgres:
        image: postgres:16.14-bookworm
        env:
          POSTGRES_DB: pulseroute_ci
          POSTGRES_USER: pulseroute
          POSTGRES_PASSWORD: pulseroute_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pulseroute -d pulseroute_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0

      - name: Enable pinned pnpm
        run: |
          corepack enable
          corepack install --global pnpm@11.12.0
          pnpm --version

      - name: Resolve pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Verify toolchain
        run: |
          node --version
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Prisma schema
        run: pnpm db:validate

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Apply database migrations
        run: pnpm db:migrate:deploy

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
