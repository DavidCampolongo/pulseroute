services:
  postgres:
    image: postgres:16.14-bookworm
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pulseroute}
      POSTGRES_USER: ${POSTGRES_USER:-pulseroute}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    ports:
      - ${POSTGRES_PORT:-5432}:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7.4.9-bookworm
    command:
      - redis-server
      - --appendonly
      - "yes"
    ports:
      - ${REDIS_PORT:-6379}:6379
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
